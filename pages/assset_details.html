<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AssetFlow - Sign Up</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&amp;family=Inter:wght@100..900&amp;family=JetBrains+Mono:wght@100..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f7fafc; /* Canvas background from style guidance */
        }
        .login-card {
            box-shadow: 0px 4px 20px rgba(0,0,0,0.05); /* Level 2 elevation for modals */
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#e0e3e5",
                        "on-tertiary-fixed-variant": "#6f3800",
                        "secondary-fixed-dim": "#a4c9ff",
                        "on-surface": "#181c1e",
                        "on-secondary-fixed-variant": "#004883",
                        "background": "#f7fafc",
                        "surface-container-highest": "#e0e3e5",
                        "on-surface-variant": "#42474f",
                        "tertiary-fixed-dim": "#ffb780",
                        "surface-bright": "#f7fafc",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#d4e3ff",
                        "primary": "#00355f",
                        "surface-tint": "#2d6197",
                        "tertiary-container": "#743b00",
                        "surface-container-high": "#e5e9eb",
                        "primary-fixed-dim": "#a0c9ff",
                        "primary-fixed": "#d2e4ff",
                        "error": "#ba1a1a",
                        "inverse-primary": "#a0c9ff",
                        "secondary": "#0060ac",
                        "outline-variant": "#c2c7d1",
                        "on-primary-fixed-variant": "#07497d",
                        "on-tertiary-container": "#f9a767",
                        "inverse-surface": "#2d3133",
                        "on-error": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "primary-container": "#0f4c81",
                        "on-secondary": "#ffffff",
                        "on-background": "#181c1e",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed": "#ffdcc4",
                        "tertiary": "#532800",
                        "on-secondary-fixed": "#001c39",
                        "on-tertiary-fixed": "#2f1400",
                        "surface-container-low": "#f1f4f6",
                        "surface-container": "#ebeef0",
                        "on-primary-fixed": "#001c37",
                        "on-error-container": "#93000a",
                        "surface-dim": "#d7dadc",
                        "on-primary-container": "#8ebdf9",
                        "inverse-on-surface": "#eef1f3",
                        "secondary-container": "#68abff",
                        "on-secondary-container": "#003e73",
                        "outline": "#727780",
                        "error-container": "#ffdad6",
                        "surface": "#f7fafc"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "margin-mobile": "16px",
                        "sidebar-width": "260px",
                        "container-max": "1440px",
                        "unit": "4px",
                        "margin-desktop": "32px"
                    },
                    "fontFamily": {
                        "headline-md": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"],
                        "headline-lg-mobile": ["Hanken Grotesk"],
                        "headline-sm": ["Hanken Grotesk"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "status-pill": ["Inter"],
                        "label-sm": ["JetBrains Mono"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "30px", "fontWeight": "700"}],
                        "headline-sm": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "status-pill": ["12px", {"lineHeight": "12px", "fontWeight": "600"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-surface font-body-md text-on-surface min-h-screen flex items-center justify-center p-gutter">
<!-- Shell Suppression: This is a focused transactional screen, so TopAppBar and SideNav are hidden per protocol -->
<main class="w-full max-w-[480px]">
<div class="login-card bg-surface-container-lowest border border-outline-variant rounded-lg overflow-hidden flex flex-col items-center">
<!-- Card Header -->
<div class="w-full bg-surface-container-low px-8 py-4 border-b border-outline-variant text-center">
<h1 class="font-headline-md text-headline-md text-primary">AssetFlow – create account</h1>
</div>
<!-- Content Area -->
<div class="w-full px-10 py-12 flex flex-col items-center">
<!-- Brand Avatar Anchor -->
<div class="w-20 h-20 rounded-full border-2 border-primary flex items-center justify-center mb-10 bg-white shadow-sm">
<span class="font-headline-md text-headline-md text-primary tracking-tight">AF</span>
</div>
<form action="#" class="w-full space-y-6" method="POST">
<!-- Full Name -->
<div class="space-y-1">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider block" for="full_name">Full Name</label>
<input class="w-full h-12 px-4 bg-white border border-outline rounded focus:ring-2 focus:ring-primary-container focus:border-primary outline-none transition-all duration-200 font-body-md" id="full_name" name="full_name" placeholder="John Doe" required="" type="text"/>
</div>
<!-- Work Email -->
<div class="space-y-1">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider block" for="email">Work Email</label>
<input class="w-full h-12 px-4 bg-white border border-outline rounded focus:ring-2 focus:ring-primary-container focus:border-primary outline-none transition-all duration-200 font-body-md" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
<!-- Password -->
<div class="space-y-1 relative">
<div class="flex justify-between items-end">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider block" for="password">Password</label>
</div>
<input class="w-full h-12 px-4 bg-white border border-outline rounded focus:ring-2 focus:ring-primary-container focus:border-primary outline-none transition-all duration-200 font-body-md" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Informational Banner -->
<div class="p-4 bg-surface-container rounded border border-outline-variant">
<p class="font-body-md text-on-surface-variant leading-relaxed">
                            Sign up creates an <span class="font-semibold">employee account</span>. 
                            Admin roles are assigned by your organization lead later.
                        </p>
</div>
<!-- Sign Up Button -->
<button class="w-full h-12 bg-primary text-on-primary font-headline-sm text-headline-sm rounded hover:opacity-90 active:scale-[0.98] transition-all shadow-sm" type="submit">
                        Sign Up
                    </button>
</form>
<!-- Navigation Back -->
<div class="mt-8 pt-6 border-t border-outline-variant w-full text-center">
<p class="font-body-md text-on-surface-variant">
                        Already have an account? 
                        <a class="text-primary font-semibold hover:underline transition-all" href="#">Back to Login</a>
</p>
</div>
</div>
</div>
<!-- Footnote / Help -->
<footer class="mt-6 flex justify-center space-x-6">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors flex items-center gap-1" href="#">
<span class="material-symbols-outlined text-[16px]">help</span> Support
            </a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors flex items-center gap-1" href="#">
<span class="material-symbols-outlined text-[16px]">gavel</span> Privacy &amp; Terms
            </a>
</footer>
</main>
<!-- Micro-interaction Script -->
<script>
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label').classList.add('text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label').classList.remove('text-primary');
            });
        });

        const signupButton = document.querySelector('button[type="submit"]');
        signupButton.addEventListener('click', (e) => {
            // Visual feedback only for demo
            if (document.querySelector('form').checkValidity()) {
                signupButton.innerHTML = '<span class="flex items-center justify-center gap-2"><svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Creating Account...</span>';
            }
        });
    </script>
</body></html>
