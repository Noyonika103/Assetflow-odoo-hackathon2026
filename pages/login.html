<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        body {
            background-color: #f7fafc;
            overflow-x: hidden;
        }
        .login-card {
            border: 1px solid #e5e7eb;
            background: #ffffff;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.02);
        }
        .input-focus-ring:focus {
            outline: none;
            border-color: #00355f;
            box-shadow: 0 0 0 2px rgba(15, 76, 129, 0.15);
        }
    </style>

<body class="min-h-screen flex items-center justify-center font-body-md text-on-surface">
<!-- Background Pattern/Atmosphere -->
<div class="fixed inset-0 pointer-events-none opacity-20 -z-10">
<div class="absolute top-0 right-0 w-1/2 h-1/2 bg-gradient-to-bl from-secondary-fixed to-transparent rounded-full filter blur-3xl transform translate-x-1/3 -translate-y-1/3"></div>
<div class="absolute bottom-0 left-0 w-1/2 h-1/2 bg-gradient-to-tr from-primary-fixed to-transparent rounded-full filter blur-3xl transform -translate-x-1/3 translate-y-1/3"></div>
</div>
<!-- Main Container -->
<main class="w-full max-w-[420px] px-margin-mobile md:px-0">
<!-- Login Card -->
<div class="login-card rounded-xl overflow-hidden">
<!-- Header Section -->
<header class="p-gutter text-center border-b border-outline-variant bg-surface-container-lowest">
<div class="flex flex-col items-center gap-4">
<!-- Brand Identity Shell (AF Logo) -->
<div class="w-16 h-16 rounded-full border-2 border-primary flex items-center justify-center group hover:scale-105 transition-transform duration-300">
<span class="font-display-lg text-primary select-none">AF</span>
</div>
<div class="space-y-1">
<h1 class="font-headline-md text-headline-md text-primary">AssetFlow – login</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Enter your credentials to access the platform</p>
</div>
</div>
</header>
<!-- Form Section -->
<section class="p-gutter">
<form class="space-y-6" id="loginForm" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider block" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">mail</span>
<input class="w-full pl-10 pr-4 py-3 border border-outline-variant rounded-lg font-body-md bg-white input-focus-ring transition-all" id="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-end">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<a class="font-body-md text-body-md text-secondary hover:underline transition-all" href="#">Forgot password</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">lock</span>
<input class="w-full pl-10 pr-4 py-3 border border-outline-variant rounded-lg font-body-md bg-white input-focus-ring transition-all" id="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Login Button -->
<button
type="button"
onclick="window.location.href='dashboard.html'"
class="w-full bg-primary text-on-primary py-3.5 rounded-lg font-body-lg font-semibold hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-2">

    Login

    <span class="material-symbols-outlined text-xl">login</span>

</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 py-8">
<div class="h-px w-full bg-outline-variant"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant whitespace-nowrap">OR</span>
<div class="h-px w-full bg-outline-variant"></div>
</div>
<!-- Sign Up Link/Section -->
<div class="space-y-4">
<div class="space-y-1">
<h2 class="font-headline-sm text-headline-sm text-on-surface">New here?</h2>
<div class="p-4 bg-surface-container rounded-lg border border-outline-variant/30">
<p class="font-body-md text-body-md text-on-surface-variant leading-relaxed">
                                Sign up creates an employee account. 
                                <br/>
<span class="font-semibold text-on-surface">Admin roles</span> are assigned by managers after verification.
                            </p>
</div>
</div>
<a class="w-full block text-center border border-outline-variant py-3.5 rounded-lg font-body-lg text-primary hover:bg-surface-container-high active:scale-[0.98] transition-all" href="#">
                        Create Account
                    </a>
</div>
</section>
<!-- Footer Compliance -->
<footer class="bg-surface-container-low px-gutter py-4 border-t border-outline-variant text-center">
<p class="font-label-sm text-label-sm text-on-surface-variant">
                    © 2024 AssetFlow Enterprise. All rights reserved.
                </p>
</footer>
</div>
<!-- System Status Indicator (Micro-interaction) -->
<div class="mt-8 flex justify-center items-center gap-3">
<div class="flex items-center gap-2 px-3 py-1 bg-white border border-outline-variant rounded-full">
<span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
<span class="font-label-sm text-[10px] text-on-surface-variant uppercase tracking-tighter">Systems Operational</span>
</div>
</div>
</main>
<script>
        // Simple Interaction Feedback
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Authenticating...';
            
            // Simulating a minor delay for UX feel
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }, 2000);
        });

        // Dynamic background motion interaction
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const backgroundShapes = document.querySelectorAll('.fixed > div');
            backgroundShapes[0].style.transform = `translate(${x * 30}px, ${y * 30}px)`;
            backgroundShapes[1].style.transform = `translate(${x * -30}px, ${y * -30}px)`;
        });
    </script>
</body></html>
